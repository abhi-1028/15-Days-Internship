<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="">
        <!-- Name -->
           <label for="name">Name:</label> <br>
           <input type="text" placeholder="Enter Your Name" name="name" id="name" required><br>

        <!-- Email -->
           <label for="email">Email Address:</label><br>
           <input type="email" placeholder="Enter a valid mail id" name="email" id="email" required><br>

        <!-- Password -->
           <label for="psw">Password:</label><br>
           <input type="password" placeholder="Enter Your Password" minlength="8" name="psw" id="psw" required><br>

        <!-- Number Input -->
           <label for="age">Age:</label><br>
           <input type="number" placeholder="Enter Age" name="age" id="age" min="15" max="25" required><br>
           
        <!-- Radio Button -->
            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="gender">Male</label>
            <input type="radio" id="Female" name="gender" value="Female">
            <label for="gender">Female</label><br>
           
        <!-- Checkbox -->
            <p>Technologies</p>
            <input type="checkbox" name="html" id="html" value="html">
            <label for="html">HTML</label>
            <input type="checkbox" name="css" id="css" value="css">
            <label for="css">CSS</label><br>

        <!-- Dropdown -->
             <label for="country">Country</label><br>
             <select name="country" id="country">
             <option value="select a country">Select a Country</option>
             <option value="india">India</option>
             <option value="U.S.A">U.S.A</option>
             <option value="australia">Australia</option>
             <option value="new zealand">New Zealand</option>
             </select><br><br>

        <!-- Text Area -->
              <label for="message">Message</label>
              <textarea name="message" id="message" placeholder="Please Drop a Message"></textarea><br><br>

        <!-- Upload a File -->
               <label for="resume">Upload Resume:</label><br>
               <input type="file" name="resume" id="resume"><br><br>

        <!-- Pick a Date -->
                <label for="dob">Date of Birth</label><br>
                <input type="date" name="dob" id="dob" placeholder="Enter your DOB"><br><br>
        <!-- Button -->
                 <button type="submit">Submit</button> 
                <button type="reset">Reset</button><br>
    </form>
</body>
</html>
